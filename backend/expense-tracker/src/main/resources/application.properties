spring.application.name=expense-tracker

spring.datasource.url=jdbc:mysql://localhost:3306/expense_tracker_db
spring.datasource.username=root
spring.datasource.password=test

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Spring Security logs
logging.level.org.springframework.security=TRACE

# Authentication logs
logging.level.org.springframework.security.authentication=TRACE

# Authorization logs
logging.level.org.springframework.security.authorization=TRACE

# Web security filter chain logs
logging.level.org.springframework.security.web=TRACE

# Your application package logs
logging.level.com.expense_tracker=DEBUG

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
